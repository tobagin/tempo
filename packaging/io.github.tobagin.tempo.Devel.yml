app-id: io.github.tobagin.tempo.Devel
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: tempo

finish-args:
  # UI permissions (minimal for GTK4/Libadwaita)
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  
  # Audio permissions (essential for metronome)
  - --socket=pulseaudio
  - --filesystem=xdg-run/pipewire-0:ro
  
  # Development permissions
  - --filesystem=host
  - --talk-name=org.freedesktop.Flatpak

cleanup:
  - /include
  - /lib/pkgconfig  
  - /share/pkgconfig
  - /share/aclocal
  - /man
  - /share/man
  - /share/gtk-doc
  - /share/vala
  - /share/devhelp
  - '*.la'
  - '*.a'

modules:
  # Main application
  - name: tempo
    buildsystem: meson
    config-opts:
      - -Ddevelopment=true
    sources:
      - type: dir
        path: ..
